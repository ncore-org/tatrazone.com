<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brak połączenia - Tatrazone</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1f2937;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 440px;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }
    .logo span {
      color: white;
      font-size: 24px;
      font-weight: 800;
    }
    .icon-wifi {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      color: #9ca3af;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #111827;
    }
    p {
      color: #6b7280;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #2563eb;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
    }
    .btn:hover { background: #1d4ed8; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn svg { width: 18px; height: 18px; }
    .footer {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); color: #f3f4f6; }
      h1 { color: #f9fafb; }
      p { color: #9ca3af; }
      .icon-wifi { color: #6b7280; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span>T</span></div>
    <svg class="icon-wifi" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <path d="M8.288 15.038a5.5 5.5 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c6.04-6.041 15.866-6.041 21.908 0"/>
      <path d="M12 20.01l.01-.011" stroke-width="2"/>
    </svg>
    <h1>Nie masz połączenia z internetem</h1>
    <p>Sprawdź swoje połączenie sieciowe i spróbuj ponownie. Niektóre treści mogą być dostępne offline.</p>
    <button class="btn" onclick="location.reload()">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
      </svg>
      Spróbuj ponownie
    </button>
    <p class="footer">&copy; Tatrazone. Wszelkie prawa zastrzeżone.</p>
  </div>
</body>
</html>
